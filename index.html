<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFG Simplifier</title>
    <style>
        /* Modern Color Palette & Variables */
        :root {
            --primary: #4f46e5;       /* Indigo */
            --primary-hover: #4338ca;
            --bg: #f3f4f6;            /* Soft Gray Background */
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --code-bg: #f8fafc;
            --code-border: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Input Section Styling */
        .input-section {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 2rem;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 1rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.05rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            resize: vertical;
            margin-bottom: 1.25rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background-color: #fafafa;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            background-color: #fff;
        }

        button {
            background-color: var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 0.85rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: translateY(2px);
        }

        /* Styles for the JS-generated Step Cards */
        .step-card {
            background: var(--card-bg);
            padding: 1.75rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
            border-left: 6px solid var(--primary);
            animation: slideIn 0.4s ease-out forwards;
            opacity: 0; /* Starts hidden for the animation */
        }

        /* Stagger the animations so they appear one after the other */
        .step-card:nth-child(1) { animation-delay: 0.1s; }
        .step-card:nth-child(2) { animation-delay: 0.2s; }
        .step-card:nth-child(3) { animation-delay: 0.3s; }
        .step-card:nth-child(4) { animation-delay: 0.4s; }

        .step-card h2 {
            font-size: 1.35rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .step-card .explanation {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 1.25rem;
            font-style: italic;
        }

        .grammar-display {
            background-color: var(--code-bg);
            border: 1px solid var(--code-border);
            padding: 1.25rem;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            font-size: 1.1rem;
            color: #0f172a;
            line-height: 1.5;
            font-weight: 500;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CFG Simplifier</h1>
            <p>Enter your Context-Free Grammar to eliminate Null, Unit, and Useless productions.</p>
        </header>

        <main>
            <section class="input-section">
                <textarea id="grammar-input" placeholder="Format example:&#10;S -> A B | a&#10;A -> b&#10;B -> b | c&#10;C -> c&#10;D -> d&#10;&#10;Use 'e' for epsilon/null productions."></textarea>
                <button onclick="processGrammar()">Simplify Grammar</button>
            </section>

            <section id="visualization"></section>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
